name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Publicar GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Extraer versión del tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verificar que package.json coincide con el tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::package.json version ($PKG_VERSION) no coincide con el tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Extraer notas del CHANGELOG
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="$(mktemp)"
          node scripts/extract-changelog.js "$VERSION" > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            echo "::error::No se encontraron notas para la versión $VERSION en CHANGELOG.md"
            exit 1
          fi
          echo "notes_path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.changelog.outputs.notes_path }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          fail_on_unmatched_files: false
